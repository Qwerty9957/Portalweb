<!DOCTYPE HTML>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>yikes!</title>
    <style>{{{ SHELL_CSS }}}</style>
	<style>
		body {
			background: #111;
			color: #fff;
			font-family: monospace;
		}

		body #emscripten_logo {
			width: 200px;
		}

		#folder-picker {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 40px;
			text-align: center;
		}

		#folder-picker h2 {
			margin-bottom: 8px;
		}

		#folder-picker p {
			color: #aaa;
			margin-bottom: 20px;
			max-width: 500px;
		}

		#select-folder-btn {
			padding: 14px 36px;
			font-size: 18px;
			background: #ff6600;
			color: #000;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-weight: bold;
		}

		#select-folder-btn:hover {
			background: #ff8833;
		}

		#selected-path {
			margin-top: 12px;
			color: #888;
			font-size: 13px;
		}

		#game-area {
			display: none;
		}
	</style>
  </head>
  <body>
    <div id="folder-picker">
      <img src="assets/portal.svg" style="width:200px;margin-bottom:20px">
      <h2>Portal: Web Port</h2>
      <p>Select your Portal game installation folder to play offline.
         The game will read and write files directly from your local folder.</p>
      <button id="select-folder-btn">Select Portal Folder</button>
      <div id="selected-path"></div>
    </div>

    <div id="game-area">
      <a href="http://emscripten.org"><img id="emscripten_logo" src="assets/portal.svg"></a>

      <div class="spinner" id='spinner'></div>
      <div class="emscripten" id="status"></div>

      <span id='controls'>
        <span><input type="button" value="Fullscreen" onclick="Module.requestFullscreen(document.getElementById('pointerLock').checked, 
                                                                                    document.getElementById('resize').checked)">
        </span>
      </span>

      <div class="emscripten">
        <progress value="0" max="100" id="progress" hidden=1></progress>
      </div>

      <div class="emscripten_border">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
      </div>
      <textarea id="output" rows="8"></textarea>
    </div>

    <script type='text/javascript'>
      // Eruda debug console — activate with ?debug=true
      if (location.search.includes('debug=true')) {
        var scr = document.createElement('script');
        scr.src = 'https://cdn.jsdelivr.net/npm/eruda';
        scr.onload = function () { eruda.init(); };
        document.head.appendChild(scr);
      }

      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      var folderPicker = document.getElementById('folder-picker');
      var gameArea = document.getElementById('game-area');
      var selectBtn = document.getElementById('select-folder-btn');
      var selectedPathEl = document.getElementById('selected-path');
      if (outputElement) outputElement.value = '';

      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      canvasElement.widthNative = screen.availWidth;
      canvasElement.heightNative = screen.availHeight;

      // ====== Folder selection ======
      selectBtn.addEventListener('click', async () => {
        try {
          selectBtn.disabled = true;
          selectBtn.textContent = 'Reading folder...';

          const rootDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });

          selectedPathEl.textContent = 'Indexing ' + rootDirHandle.name + '...';

          const dirIndex = new Map();
          async function indexDirectory(handle, prefix) {
            for await (const entry of handle.values()) {
              const path = prefix ? prefix + '/' + entry.name : entry.name;
              if (entry.kind === 'file') {
                dirIndex.set(path.toLowerCase(), entry);
              } else if (entry.kind === 'directory') {
                await indexDirectory(entry, path);
              }
            }
          }

          const start = performance.now();
          await indexDirectory(rootDirHandle, '');
          const elapsed = ((performance.now() - start) / 1000).toFixed(1);

          selectedPathEl.textContent = rootDirHandle.name + ' (' + dirIndex.size + ' files indexed in ' + elapsed + 's)';

          // Share folder access with pre.js main-thread code
          Module._rootHandle = rootDirHandle;
          Module._dirIndex = dirIndex;

          // Send directory index to the worker thread
          if (Module._sendFolderIndexToWorker) {
            Module._sendFolderIndexToWorker();
          }

          folderPicker.style.display = 'none';
          gameArea.style.display = '';

          removeRunDependency('load_game_data');
        } catch (err) {
          if (err.name === 'SecurityError' || err.name === 'AbortError') {
            selectedPathEl.textContent = 'Access denied or cancelled. Please try again.';
          } else {
            selectedPathEl.textContent = 'Error: ' + err.message;
          }
          selectBtn.disabled = false;
          selectBtn.textContent = 'Select Portal Folder';
        }
      });

      // ====== Emscripten Module ======
      var Module = {
        print(...args) {
          console.log(...args);
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight;
          }
        },
        canvas: canvasElement,
        setStatus(text) {
          Module.setStatus.last ??= { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = 'none';
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Select your Portal folder to start');
      window.onerror = (event) => {
        Module.setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
